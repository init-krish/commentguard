<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 300px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; background: #0f0f0f; color: #e0e0e0; padding: 14px; }
  header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #222; }
  header h1 { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
  .version-badge { font-size: 9px; background: #cc0000; color: #fff; padding: 2px 6px; border-radius: 10px; margin-left: auto; font-weight: 600; }
  .enable-row { display: flex; align-items: center; justify-content: space-between; background: #1a1a1a; border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; border: 1px solid #252525; }
  .enable-label { font-size: 12px; color: #bbb; font-weight: 500; }
  .switch { position: relative; width: 36px; height: 20px; }
  .switch input { display: none; }
  .switch .slider { position: absolute; inset: 0; background: #333; border-radius: 20px; cursor: pointer; transition: background 0.25s; }
  .switch input:checked + .slider { background: #cc0000; }
  .switch .slider::before { content: ""; position: absolute; width: 14px; height: 14px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: transform 0.25s; }
  .switch input:checked + .slider::before { transform: translateX(16px); }
  .section-label { font-size: 10px; font-weight: 600; color: #555; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 6px; margin-bottom: 10px; }
  .stat-card { background: #1a1a1a; border: 1px solid #252525; border-radius: 8px; padding: 8px 6px; text-align: center; }
  .stat-num { font-size: 20px; font-weight: 800; color: #fff; line-height: 1; font-variant-numeric: tabular-nums; transition: color 0.3s; }
  .stat-num.flash { color: #cc0000; }
  .stat-card .stat-lbl { font-size: 8px; color: #555; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.6px; }
  .stat-card.blurred .stat-num { color: #f59e0b; }
  .stat-card.blocked .stat-num { color: #ef4444; }
  .stat-card.top-prob .stat-num { color: #a78bfa; font-size: 15px; }
  .top-hit { background: #1a0f0f; border: 1px solid #3a1a1a; border-radius: 8px; padding: 8px 10px; margin-bottom: 10px; display: none; }
  .top-hit.visible { display: block; }
  .top-hit-label { font-size: 9px; color: #666; text-transform: uppercase; letter-spacing: 0.6px; }
  .top-hit-text { font-size: 11px; color: #fca5a5; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .top-hit-score { font-size: 10px; color: #ef4444; font-weight: 700; margin-top: 2px; }
  .threshold-wrap { background: #1a1a1a; border: 1px solid #252525; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
  .threshold-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  #threshold-display { font-size: 11px; font-weight: 600; color: #cc0000; }
  input[type=range] { width: 100%; accent-color: #cc0000; height: 4px; cursor: pointer; }
  .threshold-ticks { display: flex; justify-content: space-between; font-size: 8px; color: #444; margin-top: 4px; }
  .api-wrap { background: #1a1a1a; border: 1px solid #252525; border-radius: 8px; padding: 10px; margin-bottom: 10px; }
  input[type=text] { width: 100%; padding: 5px 8px; background: #111; border: 1px solid #2a2a2a; border-radius: 6px; color: #ccc; font-size: 11px; margin-top: 5px; transition: border-color 0.2s; }
  input[type=text]:focus { outline: none; border-color: #cc0000; }
  .btn-row { display: flex; gap: 6px; }
  .save-btn { flex: 1; padding: 8px; background: #cc0000; color: #fff; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
  .save-btn:hover { background: #aa0000; }
  .save-btn:active { transform: scale(0.97); }
  .reset-btn { padding: 8px 12px; background: #1a1a1a; color: #888; border: 1px solid #2a2a2a; border-radius: 8px; font-size: 11px; cursor: pointer; }
  .reset-btn:hover { background: #222; color: #ccc; }
  .footer { margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }
  .footer a { font-size: 10px; color: #444; text-decoration: none; }
  .footer a:hover { color: #888; }
  .clear-stats { font-size: 10px; color: #333; cursor: pointer; background: none; border: none; }
  .clear-stats:hover { color: #888; }
</style>
</head>
<body>

<header>
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
    <circle cx="12" cy="12" r="10" fill="#cc0000" opacity="0.12"/>
    <path d="M12 3.5l2.2 5.3H19l-4.1 3 1.6 5-4.5-2.9L7.5 16.8l1.6-5L5 8.8h4.8z" fill="#cc0000"/>
  </svg>
  <h1>CommentGuard</h1>
  <span class="version-badge">v2.0</span>
</header>

<div class="enable-row">
  <span class="enable-label">Filtering Active</span>
  <label class="switch">
    <input type="checkbox" id="enabled" checked>
    <div class="slider"></div>
  </label>
</div>

<div class="section-label">Session Stats</div>
<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-num" id="stat-scanned">0</div>
    <div class="stat-lbl">Scanned</div>
  </div>
  <div class="stat-card blurred">
    <div class="stat-num" id="stat-blurred">0</div>
    <div class="stat-lbl">Blurred</div>
  </div>
  <div class="stat-card blocked">
    <div class="stat-num" id="stat-blocked">0</div>
    <div class="stat-lbl">Blocked</div>
  </div>
  <div class="stat-card top-prob">
    <div class="stat-num" id="stat-top-prob">—</div>
    <div class="stat-lbl">Top %</div>
  </div>
</div>

<div class="top-hit" id="top-hit-card">
  <div class="top-hit-label">Highest Toxicity Detected</div>
  <div class="top-hit-text" id="top-hit-text">—</div>
  <div class="top-hit-score" id="top-hit-score">—</div>
</div>

<div class="section-label">Sensitivity</div>
<div class="threshold-wrap">
  <div class="threshold-top">
    <span style="font-size:11px;color:#888;">Block threshold</span>
    <span id="threshold-display">50% — Standard</span>
  </div>
  <input type="range" id="threshold" min="10" max="90" step="5" value="50">
  <div class="threshold-ticks">
    <span>Strict</span><span>Balanced</span><span>Loose</span>
  </div>
</div>

<div class="api-wrap">
  <div class="section-label" style="margin-bottom:0">API Endpoint</div>
  <input type="text" id="apiUrl" placeholder="http://127.0.0.1:8000/moderate">
</div>

<div class="btn-row">
  <button class="save-btn" id="save">Save Settings</button>
  <button class="reset-btn" id="reset">Reset</button>
</div>

<div class="footer">
  <a href="http://127.0.0.1:8000/docs" target="_blank">API Docs →</a>
  <button class="clear-stats" id="clear-stats">Clear stats</button>
  <a href="http://127.0.0.1:8000/stats" target="_blank">Full stats →</a>
</div>

<script src="popup.js"></script>
</body>
</html>
